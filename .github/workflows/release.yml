name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X github.com/ctsunny/board/internal/api.Version=${{ github.ref_name }}" \
            -o board-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X github.com/ctsunny/board/internal/api.Version=${{ github.ref_name }}" \
            -o board-linux-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            board-linux-amd64
            board-linux-arm64
          generate_release_notes: true
